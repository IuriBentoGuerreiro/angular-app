<div class="container-user">

  <form class="form-save" (ngSubmit)="create(userRequest)">

    <div class="input-form">
      <div class="search-container">
        <label class="search-label">Pesquisar Por Nome</label>
        <div class="search-group">
          <input type="text" name="name" placeholder="Digite um nome..." class="search-input" #searchInput
            [(ngModel)]="filterName.name"> <button type="button" class="search-button" (click)="serachName()">
            <mat-icon>search</mat-icon>
          </button>
        </div>
      </div>
    </div>

    <div class="inputs-column">
      <label>Nome:</label>
      <input type="text" [(ngModel)]="userRequest.name" name="name" />

      <label>Email:</label>
      <input type="email" [(ngModel)]="userRequest.email" name="email" />

      <button type="submit" class="save-button">Salvar</button>
    </div>

  </form>

  <div class="list-container">
    <h2>Lista de Usuários</h2>

    <table class="user-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>E-mail</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of users">
          <td [routerLink]="['/user-manager', u.id]">{{ u.id }}</td>
          <td [routerLink]="['/user-manager', u.id]"> {{ u.name }}</td>
          <td [routerLink]="['/user-manager', u.id]"> {{ u.email }}</td>
        </tr>
        <tr *ngIf="users.length === 0">
          <td colspan="4">Nenhum usuário cadastrado.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
